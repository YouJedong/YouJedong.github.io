<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일본 여행 플래너</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <span class="header-logo">🗾</span>
      <input type="text" id="tripName" class="trip-name-input" placeholder="여행 이름 입력">
    </div>
    <div class="header-right">
      <label class="header-field">
        <span>출발일</span>
        <input type="date" id="startDate">
      </label>
      <button class="btn-ghost" id="btnRemoveDay">− 일차</button>
      <button class="btn-ghost" id="btnAddDay">+ 일차</button>
      <div class="header-divider"></div>
      <button class="btn-ghost" id="btnManageTypes">⚙ 타입 관리</button>
      <button class="btn-ghost" id="btnExport">↓ 내보내기</button>
      <button class="btn-ghost" id="btnSaveServer">☁ 서버 저장</button>
      <label class="btn-ghost btn-import-label">
        ↑ 가져오기
        <input type="file" id="importFile" accept=".json" hidden>
      </label>
    </div>
  </header>

  <nav class="day-nav" id="dayNav">
    <!-- JS에서 생성 -->
  </nav>

  <div class="app-body">
    <main class="timeline-container" id="timelineContainer">
      <!-- JS에서 생성 -->
    </main>

    <aside class="sidebar">
      <!-- 체크리스트 -->
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">체크리스트</span>
        </div>
        <div class="checklist-add">
          <input type="text" id="newCheckItem" placeholder="항목 추가...">
          <button type="button" id="btnAddCheck">+</button>
        </div>
        <ul class="checklist" id="checklistEl"></ul>
      </div>

      <!-- 정보 목록 -->
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">정보</span>
          <button class="sidebar-add-btn" id="btnAddInfo">+ 추가</button>
        </div>
        <ul class="info-list" id="infoListEl"></ul>
      </div>
    </aside>
  </div>

  <!-- 이벤트 추가/수정 모달 -->
  <div class="modal-overlay hidden" id="eventModal">
    <div class="modal-box">
      <h2 class="modal-title" id="modalTitle">일정 추가</h2>
      <div class="form-grid">
        <label class="form-field full-width">
          <span>제목 *</span>
          <input type="text" id="evtTitle" placeholder="예: 나리타 → 신주쿠역">
        </label>
        <label class="form-field">
          <span>타입</span>
          <select id="evtType"></select>
        </label>
        <label class="form-field">
          <span>일차</span>
          <input type="number" id="evtDay" min="1" max="30">
        </label>
        <label class="form-field">
          <span>시작 시간</span>
          <input type="time" id="evtStart">
        </label>
        <label class="form-field">
          <span>종료 시간</span>
          <input type="time" id="evtEnd">
        </label>
        <label class="form-field full-width">
          <span>메모</span>
          <textarea id="evtMemo" rows="3" placeholder="예: NEX 탑승, 좌석 지정 예약 필요"></textarea>
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn-danger hidden" id="btnDeleteEvent">삭제</button>
        <div class="modal-footer-right">
          <button class="btn-ghost" id="btnCloseModal">취소</button>
          <button class="btn-primary" id="btnSaveEvent">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 타입 관리 모달 -->
  <div class="modal-overlay hidden" id="typesModal">
    <div class="modal-box modal-box--types">
      <h2 class="modal-title">타입 관리</h2>
      <p class="modal-hint">색상을 클릭하면 변경할 수 있어요</p>
      <div class="types-list" id="typesList"></div>
      <div class="add-type-row">
        <input type="color" id="newTypeColor" value="#4A90D9" title="색상 선택">
        <input type="text" id="newTypeEmoji" class="emoji-input" placeholder="😀" title="이모지 입력">
        <input type="text" id="newTypeName" placeholder="새 타입 이름 (예: 택시)">
        <button class="btn-primary" id="btnAddType">추가</button>
      </div>
      <div class="modal-footer">
        <div></div>
        <div class="modal-footer-right">
          <button class="btn-primary" id="btnCloseTypes">닫기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 정보 추가/수정 모달 -->
  <div class="modal-overlay hidden" id="infoModal">
    <div class="modal-box">
      <h2 class="modal-title" id="infoModalTitle">정보 추가</h2>
      <div class="form-grid">
        <label class="form-field full-width">
          <span>제목 *</span>
          <input type="text" id="infoTitle" placeholder="예: 환전 정보, 비상연락처">
        </label>
        <label class="form-field full-width">
          <span>내용</span>
          <textarea id="infoContent" rows="7" placeholder="내용을 입력하세요..."></textarea>
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn-danger hidden" id="btnDeleteInfo">삭제</button>
        <div class="modal-footer-right">
          <button class="btn-ghost" id="btnCloseInfo">취소</button>
          <button class="btn-primary" id="btnSaveInfo">저장</button>
        </div>
      </div>
    </div>
  </div>

  <div class="event-tooltip-popup" id="eventTooltip"></div>
  <script src="./app-core.js"></script>
  <script src="./app.js"></script>
</body>
</html>
